<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LANAZRION | Kaleidoland OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --k-pink: #E91E63; --k-purple: #9C27B0; --k-blue: #2196F3; }
        body { background-color: #020202; font-family: 'Inter', sans-serif; color: #ffffff; margin: 0; overflow: hidden; }
        
        .hero-gradient { 
            background: radial-gradient(circle at 20% 30%, rgba(233, 30, 99, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(33, 150, 243, 0.1) 0%, transparent 40%),
                        #020202; 
        }

        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .chat-widget { position: fixed; bottom: 30px; right: 30px; width: 380px; border-radius: 1.5rem; overflow: hidden; z-index: 50; }
        .chat-body { background: rgba(5, 5, 5, 0.85); height: 450px; padding: 1.25rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; }
        
        .chat-body::-webkit-scrollbar { width: 4px; }
        .chat-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .bubble { padding: 0.85rem 1.1rem; border-radius: 1.2rem; font-size: 13px; max-width: 85%; line-height: 1.5; word-wrap: break-word; }
        .bubble.bot { background: linear-gradient(135deg, rgba(156, 39, 176, 0.2), rgba(33, 150, 243, 0.2)); border: 1px solid rgba(255, 255, 255, 0.1); align-self: flex-start; border-bottom-left-radius: 0.2rem; }
        .bubble.user { background: rgba(255, 255, 255, 0.08); align-self: flex-end; border-bottom-right-radius: 0.2rem; border: 1px solid rgba(255, 255, 255, 0.05); }
        .bubble.error { color: #ef5350; }

        .logo-img { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.1); margin: 0 auto 1.5rem; display: block; }
    </style>
</head>
<body class="hero-gradient min-h-screen flex items-center justify-center">

    <div class="text-center">
        <img src="Kaleidoland%20logo.png" alt="Lanazrion Logo" class="logo-img shadow-2xl shadow-pink-500/10">
        <h1 class="text-6xl font-black italic tracking-tighter uppercase mb-2">LANAZRION_OS</h1>
        <p class="text-neutral-500 font-mono text-[10px] tracking-[0.6em] uppercase">Hémisphère Droit | Actif</p>
    </div>

    <div class="chat-widget glass-card shadow-2xl">
        <div class="p-4 border-b border-white/5 bg-black/40 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse shadow-[0_0_10px_#22c55e]"></div>
                <span class="text-[10px] font-black uppercase tracking-widest text-pink-500">Lanazrion_AI v1.1</span>
            </div>
        </div>
        
        <div id="chatBody" class="chat-body">
            <!-- Chat bubbles will be dynamically inserted here -->
        </div>

        <div class="p-4 bg-black/60 flex gap-2">
            <input type="text" id="userInput" placeholder="Entrez une commande..." class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-xs flex-1 outline-none focus:border-pink-500 transition-colors">
            <button id="sendBtn" class="bg-pink-600 p-2 rounded-xl hover:bg-pink-500 transition-all">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </div>
    </div>

    <script>
        const API_KEY = "insert";
        const MODEL_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        // Helper function to create a bubble element safely
        function createBubble(text, isBotMessage, isError = false) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble ' + (isBotMessage ? 'bot' : 'user') + (isError ? ' error' : '');
            // Use textContent to safely render text without interpreting HTML
            bubble.textContent = text;
            return bubble;
        }

        // Helper function to append bubble to chat
        function appendBubbleToChat(bubble) {
            const chatBody = document.getElementById('chatBody');
            chatBody.appendChild(bubble);
            // Auto-scroll to bottom
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            
            // Validate input
            if (!text) return;

            // Add user message bubble
            const userBubble = createBubble(text, false);
            appendBubbleToChat(userBubble);
            
            // Clear input
            input.value = "";

            try {
                // Validate response status
                const response = await fetch(MODEL_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                // Check for HTTP errors
                if (!response.ok) {
                    throw new Error(`API Error: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();
                
                // Safely access nested response
                if (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0]) {
                    const reply = data.candidates[0].content.parts[0].text;
                    const botBubble = createBubble(reply, true);
                    appendBubbleToChat(botBubble);
                } else {
                    throw new Error('Unexpected API response format');
                }
            } catch (e) {
                // Use generic error message to avoid information disclosure
                console.error('Message error:', e);
                const errorBubble = createBubble('Erreur de liaison. Vérifiez votre clé API.', true, true);
                appendBubbleToChat(errorBubble);
            }
        }

        // Attach event listeners
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Initialize: Add welcome message
        function initializeChat() {
            const welcomeText = 'Système Kaleidoland opérationnel. Comment puis-je servir vos intérêts stratégiques ou territoriaux aujourd\'hui ?';
            const welcomeBubble = createBubble(welcomeText, true);
            document.getElementById('chatBody').appendChild(welcomeBubble);
        }

        initializeChat();
    </script>
</body>
</html>
